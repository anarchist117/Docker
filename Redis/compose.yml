services:
  redis:
    image: redis:8
    container_name: redis
    restart: always
    ports:
      - "0.0.0.0:6379:6379"
    volumes: 
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
    name: redis-data
